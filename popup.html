<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Raindrop Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="app-body">
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 4h12v3a6 6 0 01-6 6 6 6 0 01-6-6V4z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
            <path d="M8 11v7c0 2.21 1.79 4 4 4s4-1.79 4-4v-7" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="brand-text">
          <h1 class="brand-title">Raindrop Sync</h1>
          <p class="brand-tagline">Chrome 书签与 Raindrop 双向同步</p>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="view-stack" aria-live="polite">
        <!-- 登录视图 -->
        <section id="auth-section" class="panel panel--auth is-active" aria-labelledby="auth-heading">
          <h2 id="auth-heading" class="sr-only">认证设置</h2>

          <div class="card card--elevated">
            <p class="card-kicker">推荐方式</p>
            <button type="button" id="oauth-login-btn" class="btn btn-primary btn-block">
              <span class="btn-label">使用 Raindrop 登录</span>
              <span class="btn-glow" aria-hidden="true"></span>
            </button>
            <p class="hint">使用 OAuth，令牌由扩展安全保存。</p>
          </div>

          <div class="divider" role="separator">
            <span>或手动输入</span>
          </div>

          <div class="card">
            <label class="field-label" for="token-input">Test Token</label>
            <div class="token-field">
              <input type="password" id="token-input" class="field-input" autocomplete="off" placeholder="粘贴您的 Test Token" spellcheck="false">
              <button type="button" id="toggle-token-visibility" class="btn-icon" title="显示/隐藏 Token" aria-label="显示或隐藏 Token" aria-pressed="false">
                <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12z" stroke="currentColor" stroke-width="1.6"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
                </svg>
              </button>
            </div>
            <button type="button" id="save-token-btn" class="btn btn-secondary btn-block">保存 Token</button>
            <p class="hint hint-tight">
              在
              <a href="https://app.raindrop.io/settings/integrations" target="_blank" rel="noopener noreferrer">Raindrop 集成设置</a>
              创建应用并复制 Token。
            </p>
          </div>
        </section>

        <!-- 已登录：同步设置 -->
        <section id="sync-section" class="panel panel--sync" aria-labelledby="sync-heading">
          <h2 id="sync-heading" class="sr-only">同步与设置</h2>

          <div class="status-strip" role="status" aria-live="polite">
            <div class="status-pill" id="sync-status-pill">
              <span class="status-dot" id="sync-status-dot" aria-hidden="true"></span>
              <span id="sync-status">未同步</span>
            </div>
            <div class="status-meta">
              <span class="status-meta-label">上次同步</span>
              <time id="last-sync-time" datetime="">从未</time>
            </div>
          </div>

          <p id="last-error-row" class="alert alert-error" hidden>
            <span class="alert-title">错误</span>
            <span id="last-error-text"></span>
          </p>

          <div class="sync-scroll">
            <section class="card card-section" aria-labelledby="map-heading">
              <div class="card-head">
                <h3 id="map-heading" class="card-title">文件夹映射</h3>
                <span id="mapping-count-badge" class="badge" aria-hidden="true">0</span>
              </div>
              <p class="card-desc">将 Chrome 中的文件夹与 Raindrop 集合一一对应；子文件夹内书签随父映射生效。</p>

              <div class="field-row">
                <div class="field">
                  <label class="field-label" for="chrome-folder-select">Chrome 文件夹</label>
                  <select id="chrome-folder-select" class="field-select"></select>
                </div>
                <div class="field">
                  <label class="field-label" for="raindrop-collection-select">Raindrop 集合</label>
                  <select id="raindrop-collection-select" class="field-select"></select>
                </div>
              </div>

              <div class="btn-row">
                <button type="button" id="add-config-btn" class="btn btn-secondary btn-flex">添加映射</button>
                <button type="button" id="save-config-btn" class="btn btn-primary btn-flex">保存全部映射</button>
              </div>

              <div id="sync-config-list" class="mapping-list"></div>
            </section>

            <section class="card card-section" aria-labelledby="pull-heading">
              <h3 id="pull-heading" class="card-title">Raindrop → Chrome 定时拉取</h3>
              <p class="card-desc">扩展按间隔从 Raindrop 拉取新书签（最短 1 分钟）。</p>
              <div class="field">
                <label class="field-label" for="pull-interval-select">拉取间隔</label>
                <select id="pull-interval-select" class="field-select" aria-describedby="pull-interval-hint"></select>
              </div>
              <p id="pull-interval-hint" class="hint">修改后在下一周期生效；也可点击「立即同步」立刻拉取。</p>
              <button type="button" id="save-interval-btn" class="btn btn-secondary btn-block">保存间隔</button>
              <p class="next-pull">
                下次拉取约 <strong id="next-pull-time">—</strong>
              </p>
            </section>

            <details class="log-details" id="sync-log" open>
              <summary class="log-summary">
                <span>同步日志</span>
                <span class="chevron" aria-hidden="true"></span>
              </summary>
              <div id="log-content" class="log-content" role="log" aria-label="同步日志"></div>
            </details>
          </div>

          <footer class="app-footer">
            <button type="button" id="manual-sync-btn" class="btn btn-primary btn-flex">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M4 12a8 8 0 0114.472-4M20 12a8 8 0 01-14.472 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                <path d="M18 4v4h-4M6 20v-4h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              立即同步
            </button>
            <button type="button" id="logout-btn" class="btn btn-danger btn-flex">退出登录</button>
          </footer>
        </section>
      </div>
    </main>

    <div id="loading" class="loading-overlay" style="display: none;" aria-hidden="true" aria-busy="false" aria-label="处理中">
      <div class="loading-card">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-text">处理中…</p>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  </div>

  <script src="config.js"></script>
  <script src="raindrop-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
